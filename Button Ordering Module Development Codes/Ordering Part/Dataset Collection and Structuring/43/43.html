<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Pattern 5</title>
    <style>
        body {
            background-color: #2c3e50;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .btn-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 107, 107, 0.9);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 30px 60px;
            font-size: 22px;
            cursor: pointer;
            width: 180px;
            height: 59px;
            border-radius: 50%;
        }
        .btn1 {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(78, 205, 196, 0.8);
            color: rgba(0, 0, 0, 1.0);
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            width: 84px;
            height: 35px;
            border-radius: 50%;
        }
        .btn2 {
            position: absolute;
            top: 35%;
            right: 15%;
            background-color: rgba(69, 183, 209, 0.7);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            width: 56px;
            height: 25px;
            border-radius: 50%;
        }
        .btn3 {
            position: absolute;
            bottom: 35%;
            right: 15%;
            background-color: rgba(150, 206, 180, 0.9);
            color: rgba(0, 0, 0, 1.0);
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            width: 96px;
            height: 41px;
            border-radius: 50%;
        }
        .btn4 {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(254, 202, 87, 0.8);
            color: rgba(0, 0, 0, 1.0);
            border: none;
            padding: 10px 20px;
            font-size: 12px;
            cursor: pointer;
            width: 68px;
            height: 29px;
            border-radius: 50%;
        }
        .btn5 {
            position: absolute;
            bottom: 35%;
            left: 15%;
            background-color: rgba(84, 160, 255, 0.9);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 18px 36px;
            font-size: 17px;
            cursor: pointer;
            width: 108px;
            height: 45px;
            border-radius: 50%;
        }
        .btn6 {
            position: absolute;
            top: 35%;
            left: 15%;
            background-color: rgba(95, 39, 205, 0.8);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 6px 12px;
            font-size: 9px;
            cursor: pointer;
            width: 44px;
            height: 21px;
            border-radius: 50%;
        }
        .btn7 {
            position: absolute;
            top: 60%;
            right: 40%;
            background-color: rgba(255, 99, 72, 0.8);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            cursor: pointer;
            width: 88px;
            height: 37px;
            border-radius: 50%;
        }
        .btn8 {
            position: absolute;
            top: 60%;
            left: 40%;
            background-color: rgba(0, 210, 211, 0.9);
            color: rgba(0, 0, 0, 1.0);
            border: none;
            padding: 22px 44px;
            font-size: 19px;
            cursor: pointer;
            width: 132px;
            height: 53px;
            border-radius: 50%;
        }
    </style>
    <script>
        function buttonClick(text) {
            console.log('Button clicked: ' + text);
        }
    </script>
</head>
<body>
    <button class="btn-center" onclick="buttonClick('CORE')">CORE</button>
    <button class="btn1" onclick="buttonClick('Top')">Top</button>
    <button class="btn2" onclick="buttonClick('Right1')">Right1</button>
    <button class="btn3" onclick="buttonClick('Right2')">Right2</button>
    <button class="btn4" onclick="buttonClick('Bottom')">Bottom</button>
    <button class="btn5" onclick="buttonClick('Left2')">Left2</button>
    <button class="btn6" onclick="buttonClick('Left1')">Left1</button>
    <button class="btn7" onclick="buttonClick('Float1')">Float1</button>
    <button class="btn8" onclick="buttonClick('Float2')">Float2</button>
</body>
</html>
