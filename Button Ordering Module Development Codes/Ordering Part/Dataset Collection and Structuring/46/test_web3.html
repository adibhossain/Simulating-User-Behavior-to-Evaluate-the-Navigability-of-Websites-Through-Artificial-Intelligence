<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="main.js"></script>
  <title>Home</title>
  <style>
    .button {
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      position: absolute;
    }

    #homeButton {
      font-size: 20px;
      background-color: #3498db;
      padding: 10px 20px;
      top: 20px;
      left: 20px;
    }

    #animalsButton {
      font-size: 16px;
      background-color: #1abc9c;
      padding: 44px 65px;
      top: 150px;
      right: 20px;
    }

    #birdsButton {
      font-size: 16px;
      background-color: #9b59b6;
      padding: 44px 65px;
      bottom: 20px;
      left: 20px;
    }

    #fishesButton {
      font-size: 16px;
      background-color: #e67e22;
      padding: 8px 16px;
      bottom: 20px;
      right: 20px;
    }

    #fruitsButton {
      font-size: 16px;
      background-color: #f39c12;
      padding: 8px 16px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #vegetablesButton {
      font-size: 16px;
      background-color: #2ecc71;
      padding: 8px 16px;
      top: calc(50% + 50px);
      left: calc(50% + 50px);
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body style="background-color: #9b59b6;">
  <header>
    <button id="homeButton" class="button" onclick="test_func(this)">HOME</button>
  </header>
  <div>
    <h2 style="text-align: center;">Home</h2>
    <button id="animalsButton" class="button" onclick="test_func(this)">Animals</button>
    <button id="birdsButton" class="button" onclick="test_func(this)">Birds</button>
    <button id="fishesButton" class="button" onclick="test_func(this)">Fishes</button>
    <button id="fruitsButton" class="button" onclick="test_func(this)">Fruits</button>
    <button id="vegetablesButton" class="button" onclick="test_func(this)">Vegetables</button>
  </div>
</body>
</html>
