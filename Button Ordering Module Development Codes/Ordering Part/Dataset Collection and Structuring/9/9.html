<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Portfolio</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .btn {
            border: none;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn-tiny {
            padding: 5px 10px;
            font-size: 10px;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }
        .btn-medium {
            padding: 12px 24px;
            font-size: 14px;
        }
        .btn-large {
            padding: 16px 32px;
            font-size: 18px;
        }
        .btn-huge {
            padding: 24px 48px;
            font-size: 24px;
        }
        .btn-neon {
            background-color: #00ff00;
            color: #000000;
            border-radius: 0;
            font-weight: bold;
        }
        .btn-red {
            background-color: #ff0000;
            color: #ffffff;
            border-radius: 50px;
        }
        .btn-blue {
            background-color: #0066ff;
            color: #ffffff;
            border-radius: 5px;
        }
        .btn-yellow {
            background-color: #ffff00;
            color: #000000;
            border-radius: 15px;
        }
        .btn-purple {
            background-color: #8000ff;
            color: #ffffff;
            border-radius: 25px;
        }
        .btn-transparent {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 10px;
        }
        .btn-gray {
            background-color: #666666;
            color: #ffffff;
            border-radius: 0;
        }
        .btn-orange {
            background-color: #ff8000;
            color: #000000;
            border-radius: 30px;
        }
        .btn-cyan {
            background-color: #00ffff;
            color: #000000;
            border-radius: 8px;
        }
        .btn-pink {
            background-color: #ff00ff;
            color: #ffffff;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dark Portfolio</h1>
        <p>Explore our creative work</p>
        
        <button class="btn btn-neon btn-huge" onclick="test_func(this)">PORTFOLIO</button>
        <button class="btn btn-red btn-large" onclick="test_func(this)">Projects</button>
        <button class="btn btn-blue btn-medium" onclick="test_func(this)">About</button>
        <button class="btn btn-yellow btn-small" onclick="test_func(this)">Contact</button>
        <button class="btn btn-purple btn-tiny" onclick="test_func(this)">Blog</button>
        <button class="btn btn-transparent btn-medium" onclick="test_func(this)">Services</button>
        <button class="btn btn-gray btn-large" onclick="test_func(this)">Gallery</button>
        <button class="btn btn-orange btn-small" onclick="test_func(this)">Team</button>
        <button class="btn btn-cyan btn-medium" onclick="test_func(this)">Skills</button>
        <button class="btn btn-pink btn-large" onclick="test_func(this)">Hire Me</button>
    </div>
</body>
</html>
