<!DOCTYPE html>
<html>
<head>
    <title>Mike's Auto Parts - Order Form</title>
    <style>
        body { 
            background-color: #e6e6fa; 
            font-family: Arial;
            margin: 20px;
        }
        .form-box {
            background-color: white;
            border: 4px double black;
            padding: 20px;
            width: 600px;
        }
        input[type="text"] {
            border: 2px inset gray;
            padding: 5px;
        }
        .order-btn {
            background-color: #4169e1;
            color: white;
            border: 3px outset #4169e1;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .part-btn {
            background-color: #f0f8ff;
            border: 1px solid #87ceeb;
            padding: 6px;
            margin: 2px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1><font color="darkblue">MIKE'S AUTO PARTS</font></h1>
    <h2>Online Ordering System</h2>
    
    <div class="form-box">
        <h3>Select Parts:</h3>
        
        <button class="part-btn" style="background-color:#ffeeee;">Brake Pads - $29.99</button>
        <button class="part-btn" style="background-color:#eeffee;">Oil Filter - $12.50</button>
        <button class="part-btn" style="background-color:#eeeeff;">Spark Plugs - $8.99</button>
        <br>
        <button class="part-btn" style="background-color:#ffffee;">Air Filter - $15.75</button>
        <button class="part-btn" style="background-color:#ffeeff;">Windshield Wipers - $22.00</button>
        <br><br>
        
        <button class="part-btn" style="font-size:16px;background-color:#ffcccc;padding:10px;">TIRES - CALL FOR PRICE</button>
        <br><br>
        
        <h3>Customer Information:</h3>
        Name: <input type="text" size="30"><br><br>
        Phone: <input type="text" size="20"><br><br>
        
        <button class="order-btn" style="font-size:18px;padding:15px;">PLACE ORDER</button>
        <button style="background-color:red;color:white;border:2px solid darkred;padding:10px;margin-left:20px;">CLEAR FORM</button>
        
        <br><br>
        <button style="background-color:green;color:white;padding:8px;border:1px solid darkgreen;">Check Order Status</button>
        <button style="background-color:orange;color:black;padding:8px;margin-left:10px;">Print Receipt</button>
        
        <br><br><br>
        <button style="background-color:purple;color:yellow;padding:20px;font-size:20px;border:5px ridge purple;">💰 SPECIAL DEALS! 💰</button>
    </div>
    
    <p><font size="2">Call us: 555-AUTO-PART | Open Mon-Sat 8AM-6PM</font></p>
</body>
</html>
