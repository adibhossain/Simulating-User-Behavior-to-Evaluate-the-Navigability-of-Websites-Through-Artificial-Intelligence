<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Station</title>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1446776877081-d282a0f896e2?w=1920&h=1080&fit=crop');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Orbitron', monospace;
        }
        .random1 {
            position: absolute;
            top: 12%;
            left: 8%;
            background-color: rgba(0, 255, 255, 0.8);
            color: #000000;
            border: 2px solid #ffffff;
            padding: 5px 10px;
            font-size: 9px;
            cursor: pointer;
            border-radius: 50px;
            animation: pulse 2s infinite;
        }
        .random2 {
            position: absolute;
            top: 35%;
            right: 12%;
            background-color: rgba(255, 0, 100, 0.9);
            color: #ffffff;
            border: none;
            padding: 35px 70px;
            font-size: 26px;
            cursor: pointer;
            border-radius: 0;
            transform: rotate(-8deg);
        }
        .random3 {
            position: absolute;
            bottom: 25%;
            left: 25%;
            background-color: rgba(255, 255, 0, 0.7);
            color: #000000;
            border: 4px solid #ff0000;
            padding: 18px 36px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 15px;
        }
        .random4 {
            position: absolute;
            top: 60%;
            left: 60%;
            background-color: rgba(0, 255, 0, 0.6);
            color: #000000;
            border: none;
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 25px;
            transform: rotate(25deg);
        }
        .random5 {
            position: absolute;
            top: 20%;
            left: 45%;
            background-color: rgba(255, 255, 255, 0.9);
            color: #000000;
            border: 3px solid #0000ff;
            padding: 25px 50px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
        }
        .random6 {
            position: absolute;
            bottom: 10%;
            right: 30%;
            background-color: rgba(128, 0, 128, 0.8);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 30px;
            transform: skew(-10deg);
        }
        .random7 {
            position: absolute;
            top: 80%;
            left: 10%;
            background-color: rgba(255, 165, 0, 0.9);
            color: #000000;
            border: 1px solid #ffffff;
            padding: 30px 60px;
            font-size: 22px;
            cursor: pointer;
            border-radius: 5px;
        }
        .random8 {
            position: absolute;
            top: 45%;
            left: 15%;
            background-color: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 15px 30px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 20px;
        }
        .random9 {
            position: absolute;
            bottom: 40%;
            right: 8%;
            background-color: rgba(255, 20, 147, 0.7);
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            font-size: 8px;
            cursor: pointer;
            border-radius: 50%;
            width: 50px;
            height: 50px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <button class="random1">scan</button>
    <button class="random2">LAUNCH</button>
    <button class="random3">Systems</button>
    <button class="random4">nav</button>
    <button class="random5">Control</button>
    <button class="random6">Engine</button>
    <button class="random7">DOCK</button>
    <button class="random8">Comm</button>
    <button class="random9">!</button>
</body>
</html>
