<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Pattern 4</title>
    <style>
        body {
            background-color: #808080;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .btn1 {
            position: absolute;
            top: 20%;
            left: 20%;
            background-color: rgba(255, 255, 255, 1.0);
            color: rgba(0, 0, 0, 1.0);
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            cursor: pointer;
            width: 121px;
            height: 58px;
        }
        .btn2 {
            position: absolute;
            top: 25%;
            right: 30%;
            background-color: rgba(153, 153, 153, 0.8);
            color: rgba(102, 102, 102, 0.6);
            border: none;
            padding: 2px 4px;
            font-size: 7px;
            cursor: pointer;
            width: 32px;
            height: 15px;
        }
        .btn3 {
            position: absolute;
            bottom: 40%;
            left: 30%;
            background-color: rgba(204, 204, 204, 0.9);
            color: rgba(51, 51, 51, 1.0);
            border: none;
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            width: 64px;
            height: 28px;
        }
        .btn4 {
            position: absolute;
            top: 60%;
            right: 20%;
            background-color: rgba(85, 85, 85, 1.0);
            color: rgba(187, 187, 187, 0.7);
            border: none;
            padding: 6px 12px;
            font-size: 10px;
            cursor: pointer;
            width: 48px;
            height: 22px;
        }
        .btn5 {
            position: absolute;
            bottom: 30%;
            right: 40%;
            background-color: rgba(51, 51, 51, 0.85);
            color: rgba(221, 221, 221, 0.9);
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            width: 76px;
            height: 32px;
        }
        .btn6 {
            position: absolute;
            top: 50%;
            left: 50%;
            background-color: rgba(102, 102, 102, 1.0);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 11px 22px;
            font-size: 13px;
            cursor: pointer;
            width: 68px;
            height: 30px;
        }
        .btn7 {
            position: absolute;
            bottom: 20%;
            left: 40%;
            background-color: rgba(221, 221, 221, 0.8);
            color: rgba(34, 34, 34, 1.0);
            border: none;
            padding: 4px 8px;
            font-size: 8px;
            cursor: pointer;
            width: 36px;
            height: 17px;
        }
        .btn8 {
            position: absolute;
            top: 70%;
            right: 50%;
            background-color: rgba(68, 68, 68, 0.9);
            color: rgba(204, 204, 204, 0.8);
            border: none;
            padding: 9px 18px;
            font-size: 11px;
            cursor: pointer;
            width: 56px;
            height: 25px;
        }
        .btn9 {
            position: absolute;
            top: 80%;
            left: 60%;
            background-color: rgba(119, 119, 119, 1.0);
            color: rgba(238, 238, 238, 0.95);
            border: none;
            padding: 5px 10px;
            font-size: 9px;
            cursor: pointer;
            width: 40px;
            height: 19px;
        }
    </style>
    <script>
        function buttonClick(text) {
            console.log('Button clicked: ' + text);
        }
    </script>
</head>
<body>
    <button class="btn1" onclick="buttonClick('Primary')">Primary</button>
    <button class="btn2" onclick="buttonClick('v')">v</button>
    <button class="btn3" onclick="buttonClick('Medium')">Medium</button>
    <button class="btn4" onclick="buttonClick('small')">small</button>
    <button class="btn5" onclick="buttonClick('Dark')">Dark</button>
    <button class="btn6" onclick="buttonClick('Center')">Center</button>
    <button class="btn7" onclick="buttonClick('t')">t</button>
    <button class="btn8" onclick="buttonClick('fade')">fade</button>
    <button class="btn9" onclick="buttonClick('end')">end</button>
</body>
</html>
