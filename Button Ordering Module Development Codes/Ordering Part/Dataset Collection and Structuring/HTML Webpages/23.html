<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray Background Subtle</title>
    <style>
        body {
            background-color: #808080;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        .btn {
            position: absolute;
            border: none;
            cursor: pointer;
        }
        .btn1 {
            top: 70px;
            left: 120px;
            padding: 40px 80px;
            background-color: #ffffff;
            color: #000000;
            font-size: 30px;
            border-radius: 5px;
        }
        .btn2 {
            top: 110px;
            right: 140px;
            padding: 4px 8px;
            background-color: #999999;
            color: #666666;
            font-size: 7px;
            border-radius: 2px;
        }
        .btn3 {
            top: 240px;
            left: 90px;
            padding: 16px 32px;
            background-color: #cccccc;
            color: #333333;
            font-size: 14px;
            border-radius: 12px;
        }
        .btn4 {
            top: 340px;
            right: 190px;
            padding: 12px 24px;
            background-color: #555555;
            color: #bbbbbb;
            font-size: 11px;
            border-radius: 18px;
        }
        .btn5 {
            bottom: 170px;
            left: 160px;
            padding: 24px 48px;
            background-color: #333333;
            color: #dddddd;
            font-size: 19px;
            border-radius: 8px;
        }
        .btn6 {
            bottom: 90px;
            right: 100px;
            padding: 14px 28px;
            background-color: #aaaaaa;
            color: #444444;
            font-size: 13px;
            border-radius: 25px;
        }
        .btn7 {
            top: 46%;
            left: 46%;
            padding: 22px 44px;
            background-color: #666666;
            color: #ffffff;
            font-size: 17px;
            border-radius: 15px;
        }
        .btn8 {
            top: 170px;
            left: 320px;
            padding: 8px 16px;
            background-color: #dddddd;
            color: #222222;
            font-size: 9px;
            border-radius: 30px;
        }
        .btn9 {
            bottom: 240px;
            right: 280px;
            padding: 18px 36px;
            background-color: #444444;
            color: #cccccc;
            font-size: 15px;
            border-radius: 6px;
        }
        .btn10 {
            top: 400px;
            left: 240px;
            padding: 10px 20px;
            background-color: #777777;
            color: #eeeeee;
            font-size: 12px;
            border-radius: 35px;
        }
    </style>
</head>
<body>
    <button class="btn btn1">STARK</button>
    <button class="btn btn2">v</button>
    <button class="btn btn3">Light</button>
    <button class="btn btn4">shade</button>
    <button class="btn btn5">Shadow</button>
    <button class="btn btn6">tone</button>
    <button class="btn btn7">Middle</button>
    <button class="btn btn8">pale</button>
    <button class="btn btn9">Darker</button>
    <button class="btn btn10">gray</button>
</body>
</html>
