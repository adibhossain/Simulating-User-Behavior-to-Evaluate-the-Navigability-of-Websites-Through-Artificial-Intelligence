<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readability Disaster</title>
    <style>
        body {
            background: repeating-linear-gradient(
                45deg,
                #ff0000,
                #ff0000 10px,
                #00ff00 10px,
                #00ff00 20px,
                #0000ff 20px,
                #0000ff 30px
            );
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .off-screen {
            position: absolute;
            top: -10px;
            left: 50%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 20px 40px;
            font-size: 16px;
            cursor: pointer;
        }
        .tiny-unreadable {
            position: absolute;
            top: 20%;
            left: 20%;
            background-color: #ffff00;
            color: #ffff33;
            border: none;
            padding: 1px 1px;
            font-size: 2px;
            cursor: pointer;
        }
        .rotated-mess {
            position: absolute;
            top: 40%;
            right: 30%;
            background-color: #ff00ff;
            color: #ffffff;
            border: none;
            padding: 15px 30px;
            font-size: 14px;
            cursor: pointer;
            transform: rotate(180deg);
        }
        .giant-overflow {
            position: absolute;
            bottom: -50px;
            right: -100px;
            background-color: #00ffff;
            color: #000000;
            border: none;
            padding: 80px 160px;
            font-size: 40px;
            cursor: pointer;
        }
        .blinking {
            position: absolute;
            top: 60%;
            left: 40%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            font-size: 12px;
            cursor: pointer;
            animation: blink 0.5s infinite;
        }
        .sideways {
            position: absolute;
            top: 30%;
            left: 10px;
            background-color: #800080;
            color: #ffffff;
            border: none;
            padding: 40px 10px;
            font-size: 16px;
            cursor: pointer;
            transform: rotate(90deg);
            transform-origin: left top;
        }
        .skewed-bad {
            position: absolute;
            bottom: 40%;
            left: 60%;
            background-color: #ff8000;
            color: #000000;
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            cursor: pointer;
            transform: skew(45deg, 15deg);
        }
        .corner-cut {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #008000;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 10px;
            cursor: pointer;
        }
        .upside-down {
            position: absolute;
            bottom: 20%;
            right: 50%;
            background-color: #000080;
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            font-size: 14px;
            cursor: pointer;
            transform: rotate(180deg) scaleX(-1);
        }
        .diagonal-text {
            position: absolute;
            top: 70%;
            left: 30%;
            background-color: #800000;
            color: #ffffff;
            border: none;
            padding: 25px 50px;
            font-size: 20px;
            cursor: pointer;
            transform: rotate(-45deg);
        }
        .partially-hidden {
            position: absolute;
            bottom: 0;
            left: 0;
            background-color: #ffff00;
            color: #000000;
            border: none;
            padding: 30px 60px;
            font-size: 22px;
            cursor: pointer;
            transform: translateY(50%);
        }
        .squished {
            position: absolute;
            top: 50%;
            right: 10%;
            background-color: #ff69b4;
            color: #ffffff;
            border: none;
            padding: 2px 40px;
            font-size: 16px;
            cursor: pointer;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <button class="off-screen">Cut Off</button>
    <button class="tiny-unreadable">.</button>
    <button class="rotated-mess">Upside Down</button>
    <button class="giant-overflow">OVERFLOW</button>
    <button class="blinking">Blink</button>
    <button class="sideways">Vertical Text</button>
    <button class="skewed-bad">Skewed</button>
    <button class="corner-cut">Corner</button>
    <button class="upside-down">Flipped</button>
    <button class="diagonal-text">Diagonal</button>
    <button class="partially-hidden">Half Hidden</button>
    <button class="squished">Squished</button>
</body>
</html>
