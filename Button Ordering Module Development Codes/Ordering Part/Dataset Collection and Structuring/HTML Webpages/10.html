<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Store</title>
    <style>
        body {
            background-color: #f5f5f5;
            color: #333333;
            font-family: 'Helvetica', sans-serif;
            margin: 0;
            padding: 30px;
            overflow: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .btn {
            border: none;
            cursor: pointer;
            margin: 8px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .btn-xs {
            padding: 4px 8px;
            font-size: 10px;
        }
        .btn-s {
            padding: 6px 12px;
            font-size: 11px;
        }
        .btn-m {
            padding: 10px 20px;
            font-size: 13px;
        }
        .btn-l {
            padding: 14px 28px;
            font-size: 15px;
        }
        .btn-xl {
            padding: 20px 40px;
            font-size: 20px;
        }
        .btn-light-gray {
            background-color: #e0e0e0;
            color: #666666;
            border-radius: 3px;
        }
        .btn-beige {
            background-color: #f0f0e8;
            color: #8a8a7a;
            border-radius: 6px;
        }
        .btn-cream {
            background-color: #faf8f0;
            color: #9a9a8a;
            border-radius: 12px;
        }
        .btn-pale-blue {
            background-color: #e8f0ff;
            color: #7a8aaa;
            border-radius: 18px;
        }
        .btn-pale-green {
            background-color: #f0fff0;
            color: #8aaa8a;
            border-radius: 24px;
        }
        .btn-pale-pink {
            background-color: #fff0f8;
            color: #aa8a9a;
            border-radius: 30px;
        }
        .btn-off-white {
            background-color: #fefefe;
            color: #aaaaaa;
            border-radius: 2px;
        }
        .btn-light-yellow {
            background-color: #fffef0;
            color: #aaaa8a;
            border-radius: 8px;
        }
        .btn-lavender {
            background-color: #f8f0ff;
            color: #9a8aaa;
            border-radius: 15px;
        }
        .btn-mint {
            background-color: #f0fff8;
            color: #8aaa9a;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Minimal Store</h1>
        <p>Curated collection of essentials</p>
        
        <button class="btn btn-light-gray btn-xl">Shop Now</button>
        <button class="btn btn-beige btn-l">Categories</button>
        <button class="btn btn-cream btn-m">New Arrivals</button>
        <button class="btn btn-pale-blue btn-s">Sale</button>
        <button class="btn btn-pale-green btn-xs">Wishlist</button>
        <button class="btn btn-pale-pink btn-m">Account</button>
        <button class="btn btn-off-white btn-l">Cart</button>
        <button class="btn btn-light-yellow btn-s">Search</button>
        <button class="btn btn-lavender btn-m">Help</button>
        <button class="btn btn-mint btn-l">Reviews</button>
    </div>
</body>
</html>
