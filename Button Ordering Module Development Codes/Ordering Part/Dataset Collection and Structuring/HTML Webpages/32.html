<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparency Chaos</title>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=1920&h=1080&fit=crop');
            background-size: cover;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .ghost {
            position: absolute;
            top: 30%;
            left: 20%;
            background-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 40px;
            font-size: 16px;
            cursor: pointer;
        }
        .semi-visible {
            position: absolute;
            top: 25%;
            left: 15%;
            background-color: rgba(255, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.6);
            border: none;
            padding: 30px 60px;
            font-size: 20px;
            cursor: pointer;
        }
        .overlapping1 {
            position: absolute;
            top: 50%;
            left: 40%;
            background-color: rgba(0, 255, 0, 0.7);
            color: #000000;
            border: none;
            padding: 25px 50px;
            font-size: 18px;
            cursor: pointer;
            z-index: 1;
        }
        .overlapping2 {
            position: absolute;
            top: 55%;
            left: 45%;
            background-color: rgba(0, 0, 255, 0.6);
            color: #ffffff;
            border: none;
            padding: 25px 50px;
            font-size: 18px;
            cursor: pointer;
            z-index: 2;
        }
        .barely-there {
            position: absolute;
            bottom: 30%;
            right: 20%;
            background-color: rgba(255, 255, 0, 0.05);
            color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 15px 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .too-transparent {
            position: absolute;
            top: 70%;
            left: 60%;
            background-color: rgba(128, 0, 128, 0.2);
            color: rgba(255, 255, 255, 0.4);
            border: none;
            padding: 18px 36px;
            font-size: 15px;
            cursor: pointer;
        }
        .solid-good {
            position: absolute;
            bottom: 20%;
            left: 30%;
            background-color: #ff6b35;
            color: #ffffff;
            border: none;
            padding: 20px 40px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .ultra-faded {
            position: absolute;
            top: 10%;
            right: 10%;
            background-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 12px 24px;
            font-size: 12px;
            cursor: pointer;
        }
        .medium-fade {
            position: absolute;
            bottom: 50%;
            right: 40%;
            background-color: rgba(255, 165, 0, 0.5);
            color: rgba(0, 0, 0, 0.8);
            border: none;
            padding: 14px 28px;
            font-size: 13px;
            cursor: pointer;
        }
        .confusing {
            position: absolute;
            top: 80%;
            right: 30%;
            background-color: rgba(0, 255, 255, 0.3);
            color: rgba(255, 0, 255, 0.4);
            border: 2px solid rgba(255, 255, 0, 0.2);
            padding: 10px 20px;
            font-size: 11px;
            cursor: pointer;
        }
        .huge-transparent {
            position: absolute;
            top: 40%;
            right: 5%;
            background-color: rgba(255, 20, 147, 0.15);
            color: rgba(255, 255, 255, 0.25);
            border: none;
            padding: 50px 100px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="ghost">Ghost</button>
    <button class="semi-visible">Semi</button>
    <button class="overlapping1">Under</button>
    <button class="overlapping2">Over</button>
    <button class="barely-there">Barely</button>
    <button class="too-transparent">Faded</button>
    <button class="solid-good">Solid</button>
    <button class="ultra-faded">Ultra</button>
    <button class="medium-fade">Medium</button>
    <button class="confusing">Confuse</button>
    <button class="huge-transparent">HUGE</button>
</body>
</html>
