<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Layout</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: #2c3e50;
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        .btn {
            position: absolute;
            border: none;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .organic1 {
            top: 15%;
            left: 10%;
            padding: 20px 40px;
            background-color: rgba(255, 107, 107, 0.9);
            color: white;
            border-radius: 50px 20px 50px 20px;
            font-size: 18px;
            transform: rotate(-5deg);
        }
        .organic2 {
            top: 25%;
            right: 15%;
            padding: 12px 24px;
            background-color: rgba(78, 205, 196, 0.8);
            color: black;
            border-radius: 30px 5px 30px 5px;
            font-size: 14px;
            transform: rotate(8deg);
        }
        .organic3 {
            top: 45%;
            left: 20%;
            padding: 8px 16px;
            background-color: rgba(69, 183, 209, 0.7);
            color: white;
            border-radius: 15px 40px 15px 40px;
            font-size: 12px;
            transform: rotate(-12deg);
        }
        .organic4 {
            top: 60%;
            right: 25%;
            padding: 25px 50px;
            background-color: rgba(150, 206, 180, 0.9);
            color: black;
            border-radius: 60px 10px 60px 10px;
            font-size: 20px;
            transform: rotate(3deg);
        }
        .organic5 {
            bottom: 20%;
            left: 30%;
            padding: 15px 30px;
            background-color: rgba(254, 202, 87, 0.8);
            color: black;
            border-radius: 25px 45px 25px 45px;
            font-size: 16px;
            transform: rotate(-8deg);
        }
        .organic6 {
            bottom: 30%;
            right: 10%;
            padding: 10px 20px;
            background-color: rgba(255, 159, 243, 0.7);
            color: black;
            border-radius: 35px 8px 35px 8px;
            font-size: 13px;
            transform: rotate(15deg);
        }
        .organic7 {
            top: 35%;
            left: 50%;
            padding: 18px 36px;
            background-color: rgba(84, 160, 255, 0.9);
            color: white;
            border-radius: 20px 50px 20px 50px;
            font-size: 17px;
            transform: rotate(-3deg);
        }
        .organic8 {
            top: 70%;
            left: 60%;
            padding: 6px 12px;
            background-color: rgba(95, 39, 205, 0.8);
            color: white;
            border-radius: 40px 12px 40px 12px;
            font-size: 10px;
            transform: rotate(10deg);
        }
        .organic9 {
            top: 80%;
            left: 45%;
            padding: 22px 44px;
            background-color: rgba(0, 210, 211, 0.9);
            color: black;
            border-radius: 55px 15px 55px 15px;
            font-size: 19px;
            transform: rotate(-6deg);
        }
        .organic10 {
            top: 10%;
            left: 45%;
            padding: 14px 28px;
            background-color: rgba(255, 99, 72, 0.8);
            color: white;
            border-radius: 18px 42px 18px 42px;
            font-size: 15px;
            transform: rotate(7deg);
        }
    </style>
</head>
<body>
    <button class="btn organic1">Explore</button>
    <button class="btn organic2">Create</button>
    <button class="btn organic3">Share</button>
    <button class="btn organic4">Discover</button>
    <button class="btn organic5">Connect</button>
    <button class="btn organic6">Learn</button>
    <button class="btn organic7">Inspire</button>
    <button class="btn organic8">Play</button>
    <button class="btn organic9">Collaborate</button>
    <button class="btn organic10">Dream</button>
</body>
</html>
