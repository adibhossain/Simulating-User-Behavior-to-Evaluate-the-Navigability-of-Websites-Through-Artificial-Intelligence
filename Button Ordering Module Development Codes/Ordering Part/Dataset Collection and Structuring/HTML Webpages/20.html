<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Contrast Black</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        .btn {
            position: absolute;
            border: none;
            cursor: pointer;
        }
        .btn1 {
            top: 60px;
            left: 80px;
            padding: 28px 56px;
            background-color: #1a1a1a;
            color: #333333;
            font-size: 22px;
        }
        .btn2 {
            top: 120px;
            right: 100px;
            padding: 10px 20px;
            background-color: #2a2a2a;
            color: #444444;
            font-size: 12px;
        }
        .btn3 {
            top: 250px;
            left: 60px;
            padding: 16px 32px;
            background-color: #3a3a3a;
            color: #555555;
            font-size: 15px;
        }
        .btn4 {
            top: 350px;
            right: 150px;
            padding: 14px 28px;
            background-color: #4a4a4a;
            color: #666666;
            font-size: 13px;
        }
        .btn5 {
            bottom: 180px;
            left: 120px;
            padding: 20px 40px;
            background-color: #5a5a5a;
            color: #777777;
            font-size: 17px;
        }
        .btn6 {
            bottom: 120px;
            right: 90px;
            padding: 12px 24px;
            background-color: #6a6a6a;
            color: #888888;
            font-size: 11px;
        }
        .btn7 {
            top: 45%;
            left: 45%;
            padding: 24px 48px;
            background-color: #7a7a7a;
            color: #999999;
            font-size: 20px;
        }
        .btn8 {
            top: 180px;
            left: 250px;
            padding: 8px 16px;
            background-color: #8a8a8a;
            color: #aaaaaa;
            font-size: 10px;
        }
        .btn9 {
            bottom: 250px;
            right: 200px;
            padding: 18px 36px;
            background-color: #9a9a9a;
            color: #bbbbbb;
            font-size: 16px;
        }
        .btn10 {
            top: 420px;
            left: 180px;
            padding: 6px 12px;
            background-color: #aaaaaa;
            color: #cccccc;
            font-size: 8px;
        }
    </style>
</head>
<body>
    <button class="btn btn1">subtle</button>
    <button class="btn btn2">quiet</button>
    <button class="btn btn3">muted</button>
    <button class="btn btn4">soft</button>
    <button class="btn btn5">gentle</button>
    <button class="btn btn6">dim</button>
    <button class="btn btn7">faded</button>
    <button class="btn btn8">low</button>
    <button class="btn btn9">minimal</button>
    <button class="btn btn10">x</button>
</body>
</html>
