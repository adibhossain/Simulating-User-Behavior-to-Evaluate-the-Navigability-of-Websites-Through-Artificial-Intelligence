<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Pattern 1</title>
    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #28a745;
            padding: 10px 0;
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-btn1 {
            background-color: rgba(255, 255, 255, 1.0);
            color: rgba(0, 0, 0, 1.0);
            border: none;
            padding: 11px 22px;
            font-size: 13px;
            cursor: pointer;
            width: 100px;
            height: 22px;
        }
        .nav-btn2 {
            background-color: rgba(255, 227, 132, 0.8);
            color: rgba(153, 0, 0, 1.0);
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            width: 120px;
            height: 30px;
        }
        .nav-btn3 {
            background-color: rgba(78, 205, 196, 0.8);
            color: rgba(51, 0, 0, 1.0);
            border: none;
            padding: 8px 16px;
            font-size: 10px;
            cursor: pointer;
            width: 80px;
            height: 21px;
        }
        .nav-btn4 {
            background-color: rgba(230, 126, 34, 1.0);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            width: 96px;
            height: 25px;
        }
        .nav-btn5 {
            background-color: rgba(155, 89, 182, 0.85);
            color: rgba(255, 255, 255, 1.0);
            border: none;
            padding: 6px 12px;
            font-size: 9px;
            cursor: pointer;
            width: 60px;
            height: 18px;
        }
        .nav-btn6 {
            background-color: rgba(52, 152, 219, 1.0);
            color: rgba(0, 0, 0, 1.0);
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            cursor: pointer;
            width: 160px;
            height: 40px;
        }
    </style>
    <script>
        function buttonClick(text) {
            console.log('Button clicked: ' + text);
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <button class="nav-btn1" onclick="buttonClick('Home')">Home</button>
        <button class="nav-btn2" onclick="buttonClick('Services')">Services</button>
        <button class="nav-btn3" onclick="buttonClick('About')">About</button>
        <button class="nav-btn4" onclick="buttonClick('Contact')">Contact</button>
        <button class="nav-btn5" onclick="buttonClick('Blog')">Blog</button>
        <button class="nav-btn6" onclick="buttonClick('Portfolio')">Portfolio</button>
    </nav>
</body>
</html>
