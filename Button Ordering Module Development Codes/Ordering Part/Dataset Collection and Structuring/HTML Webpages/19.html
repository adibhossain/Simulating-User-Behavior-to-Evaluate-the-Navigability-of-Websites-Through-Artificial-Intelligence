<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Contrast White</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        .btn {
            position: absolute;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn1 {
            top: 50px;
            left: 100px;
            padding: 30px 60px;
            background-color: #000000;
            color: #ffffff;
            font-size: 24px;
        }
        .btn2 {
            top: 80px;
            right: 120px;
            padding: 8px 16px;
            background-color: #ff0000;
            color: #ffffff;
            font-size: 10px;
        }
        .btn3 {
            top: 200px;
            left: 50px;
            padding: 15px 30px;
            background-color: #0000ff;
            color: #ffffff;
            font-size: 16px;
        }
        .btn4 {
            top: 300px;
            right: 200px;
            padding: 20px 40px;
            background-color: #008000;
            color: #ffffff;
            font-size: 18px;
        }
        .btn5 {
            bottom: 150px;
            left: 150px;
            padding: 12px 24px;
            background-color: #800080;
            color: #ffffff;
            font-size: 14px;
        }
        .btn6 {
            bottom: 100px;
            right: 80px;
            padding: 25px 50px;
            background-color: #ff8000;
            color: #000000;
            font-size: 20px;
        }
        .btn7 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 36px;
            background-color: #ff00ff;
            color: #ffffff;
            font-size: 17px;
        }
        .btn8 {
            top: 150px;
            left: 300px;
            padding: 6px 12px;
            background-color: #00ffff;
            color: #000000;
            font-size: 9px;
        }
        .btn9 {
            bottom: 200px;
            right: 300px;
            padding: 22px 44px;
            background-color: #ffff00;
            color: #000000;
            font-size: 19px;
        }
        .btn10 {
            top: 400px;
            left: 200px;
            padding: 10px 20px;
            background-color: #800000;
            color: #ffffff;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <button class="btn btn1">PRIMARY</button>
    <button class="btn btn2">alert</button>
    <button class="btn btn3">Action</button>
    <button class="btn btn4">Success</button>
    <button class="btn btn5">Info</button>
    <button class="btn btn6">Warning</button>
    <button class="btn btn7">Special</button>
    <button class="btn btn8">tiny</button>
    <button class="btn btn9">Highlight</button>
    <button class="btn btn10">Dark</button>
</body>
</html>
