<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Grid</title>
    <style>
        body {
            background: 
                repeating-linear-gradient(45deg, #2c3e50 0px, #2c3e50 10px, #34495e 10px, #34495e 20px),
                repeating-linear-gradient(-45deg, transparent 0px, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px);
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Courier New', monospace;
            color: #ecf0f1;
        }
        .main-content {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .center-cluster {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .grid-btn {
            background-color: #3498db;
            color: #ffffff;
            border: none;
            padding: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .grid-btn:hover {
            background-color: #2980b9;
            transform: scale(0.95);
        }
        .floating-left {
            position: absolute;
            left: 50px;
            top: 25%;
            background-color: #e74c3c;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 50%;
            width: 60px;
            height: 60px;
        }
        .floating-right {
            position: absolute;
            right: 80px;
            top: 70%;
            background-color: #f39c12;
            color: #000000;
            border: none;
            padding: 12px 24px;
            font-size: 12px;
            cursor: pointer;
            transform: skew(-15deg);
        }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .footer-btn {
            background-color: transparent;
            color: #bdc3c7;
            border: 1px solid #bdc3c7;
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
        }
        .footer-btn:hover {
            background-color: #bdc3c7;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="center-cluster">
            <button class="grid-btn">DATA</button>
            <button class="grid-btn">SYNC</button>
            <button class="grid-btn">LOAD</button>
            <button class="grid-btn">SAVE</button>
            <button class="grid-btn">EXEC</button>
            <button class="grid-btn">EXIT</button>
        </div>
    </div>
    
    <button class="floating-left">!</button>
    <button class="floating-right">Config</button>
    
    <footer class="footer">
        <button class="footer-btn">Status</button>
        <button class="footer-btn">Log</button>
        <button class="footer-btn">Debug</button>
        <button class="footer-btn">Help</button>
    </footer>
</body>
</html>
