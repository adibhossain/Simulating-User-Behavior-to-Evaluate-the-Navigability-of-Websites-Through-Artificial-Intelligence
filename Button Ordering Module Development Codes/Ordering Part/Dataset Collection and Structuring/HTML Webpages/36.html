<!DOCTYPE html>
<html>
<head>
    <title>Sarah's Recipe Collection</title>
    <style>
        body {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" fill="%23fff"/><circle cx="10" cy="10" r="2" fill="%23ddd"/></svg>');
            margin: 0;
            font-family: Comic Sans MS;
        }
        .header {
            background-color: #ff99cc;
            border: 5px ridge #ff66aa;
            padding: 20px;
            text-align: center;
        }
        .content {
            background-color: #ffffee;
            border: 3px groove #cccccc;
            margin: 10px;
            padding: 15px;
        }
        .recipe-btn {
            background-color: #ffccaa;
            border: 2px outset #ff9966;
            padding: 10px;
            margin: 5px;
            cursor: pointer;
            font-family: Comic Sans MS;
        }
        .category-btn {
            background-color: #ccffcc;
            border: 3px ridge #99cc99;
            padding: 8px;
            margin: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><font color="#cc0066">🍰 Sarah's Kitchen 🍰</font></h1>
        <h3>Homemade Recipes Since 1995!</h3>
    </div>
    
    <div class="content">
        <h2><u>Recipe Categories:</u></h2>
        
        <button class="category-btn" style="background-color:#ffdddd;">Desserts</button>
        <button class="category-btn" style="background-color:#ddffdd;">Main Dishes</button>
        <button class="category-btn" style="background-color:#ddddff;">Appetizers</button>
        <button class="category-btn" style="background-color:#ffffdd;">Soups</button>
        <br><br>
        
        <h2><u>Popular Recipes:</u></h2>
        
        <button class="recipe-btn" style="font-size:14px;">Chocolate Chip Cookies</button>
        <button class="recipe-btn" style="font-size:12px;background-color:#ffaacc;">Grandma's Apple Pie</button>
        <br>
        <button class="recipe-btn" style="font-size:16px;background-color:#aaffaa;">Spaghetti & Meatballs</button>
        <br>
        <button class="recipe-btn" style="font-size:10px;">Chicken Soup</button>
        <button class="recipe-btn" style="font-size:18px;background-color:#ffff99;">FAMOUS BROWNIES!</button>
        <br><br>
        
        <button style="background-color:#ff6666;color:white;padding:15px;border:4px solid #cc0000;font-size:20px;">📧 EMAIL ME YOUR RECIPES!</button>
        
        <br><br>
        <button style="background-color:#6666ff;color:white;padding:12px;border:2px solid #0000cc;">Print All Recipes</button>
        <button style="background-color:#66ff66;color:black;padding:10px;margin-left:20px;">Recipe of the Day</button>
    </div>
    
    <center>
        <p><blink><font color="red">New recipes added weekly!</font></blink></p>
    </center>
</body>
</html>
