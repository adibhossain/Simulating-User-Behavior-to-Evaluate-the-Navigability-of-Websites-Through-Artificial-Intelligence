<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Agency</title>
    <style>
        body {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            color: #2c3e50;
            font-family: 'Comic Sans MS', cursive;
            margin: 0;
            padding: 25px;
            overflow: hidden;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .btn {
            border: none;
            cursor: pointer;
            margin: 12px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
        }
        .btn-micro {
            padding: 3px 6px;
            font-size: 8px;
        }
        .btn-mini {
            padding: 5px 10px;
            font-size: 10px;
        }
        .btn-normal {
            padding: 12px 24px;
            font-size: 14px;
        }
        .btn-big {
            padding: 18px 36px;
            font-size: 18px;
        }
        .btn-giant {
            padding: 30px 60px;
            font-size: 28px;
        }
        .btn-rainbow1 {
            background: linear-gradient(45deg, #ff0000, #ff8000);
            color: #ffffff;
            border-radius: 50px;
        }
        .btn-rainbow2 {
            background: linear-gradient(45deg, #00ff00, #0080ff);
            color: #000000;
            border-radius: 0;
        }
        .btn-rainbow3 {
            background: linear-gradient(45deg, #8000ff, #ff0080);
            color: #ffffff;
            border-radius: 10px;
        }
        .btn-solid-red {
            background-color: #e74c3c;
            color: #ffffff;
            border-radius: 25px;
        }
        .btn-solid-blue {
            background-color: #3498db;
            color: #ffffff;
            border-radius: 5px;
        }
        .btn-solid-green {
            background-color: #2ecc71;
            color: #ffffff;
            border-radius: 15px;
        }
        .btn-solid-purple {
            background-color: #9b59b6;
            color: #ffffff;
            border-radius: 35px;
        }
        .btn-solid-orange {
            background-color: #f39c12;
            color: #000000;
            border-radius: 8px;
        }
        .btn-solid-teal {
            background-color: #1abc9c;
            color: #ffffff;
            border-radius: 20px;
        }
        .btn-solid-pink {
            background-color: #e91e63;
            color: #ffffff;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Creative Agency</h1>
        <p>Where imagination meets innovation</p>
        
        <button class="btn btn-rainbow1 btn-giant">CREATE</button>
        <button class="btn btn-rainbow2 btn-big">Design</button>
        <button class="btn btn-rainbow3 btn-normal">Develop</button>
        <button class="btn btn-solid-red btn-mini">Brand</button>
        <button class="btn btn-solid-blue btn-micro">Logo</button>
        <button class="btn btn-solid-green btn-normal">Web</button>
        <button class="btn btn-solid-purple btn-big">Mobile</button>
        <button class="btn btn-solid-orange btn-mini">Print</button>
        <button class="btn btn-solid-teal btn-normal">Video</button>
        <button class="btn btn-solid-pink btn-big">Contact</button>
    </div>
    <script>
        const buttons = document.querySelectorAll('button,a');
        buttons.forEach(button => {
        button.addEventListener('click', () => {
            test_func(button);
        });
        });
    </script>
</body>
</html>
