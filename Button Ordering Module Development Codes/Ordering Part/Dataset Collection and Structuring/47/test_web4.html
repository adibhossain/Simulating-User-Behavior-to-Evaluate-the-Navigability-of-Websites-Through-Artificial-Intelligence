<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="main.js"></script>
<title>Button Click Tracker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    padding: 20px;
    color: #fff;
    position: relative; /* Set the body as relative for absolute positioning */
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background-color: #2e2e2e;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  .button {
    display: block;
    padding: 15px;
    border: none;
    background-color: transparent;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    position: absolute; /* Position the buttons absolutely */
  }
  .button:hover {
    background-color: #404040;
  }
  /* Custom styles for each button */
  #buttonX {
    top: 20px;
    left: 20px;
    font-size: 24px;
    color: #3498db;
  }
  #buttonY {
    bottom: -100px; /* Changed from top to bottom */
    left: 20px;
    font-size: 20px;
    background-color: #e67e22;
  }
  #buttonZ {
    bottom: 20px;
    left: 20px;
    font-size: 18px;
    color: #27ae60;
  }
  #buttonW {
    bottom: 20px;
    right: 20px;
    font-size: 22px;
    color: #9b59b6;
  }
  #buttonV {
    top: 20px;
    right: 20px;
    font-size: 18px;
    background-color: #c0392b;
  }
  #buttonU {
    bottom: -50%; /* Changed from top to bottom */
    right: 50%; /* Changed from left to right */
    transform: translate(50%, 50%);
    font-size: 20px;
    color: #f1c40f;
  }
</style>
</head>
<body>
<div class="container">
  <h2 style="text-align: center;">Button Click Tracker</h2>
  <p style="text-align: center;">Welcome! Click on the buttons below to track their order:</p>
  <!-- Add id attributes to identify each button -->
  <header>
    <button id="buttonX" class="button" onclick="test_func(this)">Button X</button>
  </header>
  <div>
    <button id="buttonY" class="button" onclick="test_func(this)">Button Y</button>
  </div>
  <footer>
    <button id="buttonZ" class="button" onclick="test_func(this)">Button Z</button>
    <button id="buttonW" class="button" onclick="test_func(this)">Button W</button>
    <button id="buttonV" class="button" onclick="test_func(this)">Button V</button>
    <button id="buttonU" class="button" onclick="test_func(this)">Button U</button>
  </footer>
</div>

<script>
  let clickOrder = [];

  function trackButtonClick(buttonTitle) {
    clickOrder.push(buttonTitle);
    console.log("Clicked:", buttonTitle);
    console.log("Click Order:", clickOrder);
  }
</script>
</body>
</html>
