<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="main.js"></script>
<title>Bad Webpage</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    padding: 20px;
    color: #333;
  }
  /* Poorly styled buttons */
  .button1 {
    padding: 10px;
    background-color: #3498db;
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    position: absolute;
    top: 20px;
    left: 20px;
  }
  .button2 {
    padding: 20px 30px;
    background-color: #e74c3c;
    color: #fff;
    border: 2px solid #c0392b;
    border-radius: 10px;
    cursor: pointer;
    position: absolute;
    top: 50%;
    right: 50%;
    transform: translate(50%, -50%);
  }
  .button3 {
    padding: 5px 10px;
    background-color: #27ae60;
    color: #fff;
    border: none;
    border-radius: 0;
    cursor: pointer;
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
  }
  .button4 {
    padding: 15px;
    background-color: #f39c12;
    color: #fff;
    border: 3px dashed #d35400;
    border-radius: 20px;
    cursor: pointer;
    position: absolute;
    bottom: 20px;
    right: 20px;
  }
</style>
</head>
<body>
<!-- Poorly positioned and styled buttons -->

<button class="button1" onclick="test_func(this)">Click!</button>
<button class="button2" onclick="test_func(this)">Button 2</button>
<button class="button3"onclick="test_func(this)">Click Me</button>
<button class="button4"onclick="test_func(this)">Button 4</button>
</body>
</html>
