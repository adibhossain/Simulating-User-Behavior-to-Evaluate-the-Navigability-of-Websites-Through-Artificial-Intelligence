<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrast Nightmare</title>
    <style>
        body {
            background-color: #ff0000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .red-on-red {
            position: absolute;
            top: 20%;
            left: 10%;
            background-color: #ff3333;
            color: #ff6666;
            border: none;
            padding: 25px 50px;
            font-size: 18px;
            cursor: pointer;
        }
        .green-on-red {
            position: absolute;
            top: 15%;
            right: 15%;
            background-color: #00ff00;
            color: #ff0000;
            border: none;
            padding: 40px 80px;
            font-size: 28px;
            cursor: pointer;
        }
        .yellow-mess {
            position: absolute;
            bottom: 30%;
            left: 30%;
            background-color: #ffff00;
            color: #ffff99;
            border: none;
            padding: 12px 24px;
            font-size: 12px;
            cursor: pointer;
        }
        .purple-clash {
            position: absolute;
            top: 60%;
            right: 20%;
            background-color: #ff00ff;
            color: #ff0000;
            border: none;
            padding: 35px 70px;
            font-size: 24px;
            cursor: pointer;
        }
        .orange-bad {
            position: absolute;
            bottom: 20%;
            right: 40%;
            background-color: #ff8800;
            color: #ff4400;
            border: none;
            padding: 8px 16px;
            font-size: 10px;
            cursor: pointer;
        }
        .cyan-horrible {
            position: absolute;
            top: 45%;
            left: 45%;
            background-color: #00ffff;
            color: #88ffff;
            border: none;
            padding: 20px 40px;
            font-size: 16px;
            cursor: pointer;
        }
        .white-washed {
            position: absolute;
            bottom: 10%;
            left: 10%;
            background-color: #ffffff;
            color: #ffffee;
            border: none;
            padding: 30px 60px;
            font-size: 20px;
            cursor: pointer;
        }
        .dark-on-red {
            position: absolute;
            top: 35%;
            left: 25%;
            background-color: #330000;
            color: #660000;
            border: none;
            padding: 15px 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .pink-disaster {
            position: absolute;
            bottom: 50%;
            right: 10%;
            background-color: #ffaaaa;
            color: #ff8888;
            border: none;
            padding: 18px 36px;
            font-size: 15px;
            cursor: pointer;
        }
        .blue-wrong {
            position: absolute;
            top: 70%;
            left: 60%;
            background-color: #0000ff;
            color: #3333ff;
            border: none;
            padding: 22px 44px;
            font-size: 17px;
            cursor: pointer;
        }
        .lime-awful {
            position: absolute;
            top: 80%;
            right: 60%;
            background-color: #88ff88;
            color: #aaffaa;
            border: none;
            padding: 6px 12px;
            font-size: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="red-on-red">Invisible</button>
    <button class="green-on-red">CLASH</button>
    <button class="yellow-mess">Washed</button>
    <button class="purple-clash">BRIGHT</button>
    <button class="orange-bad">Bad</button>
    <button class="cyan-horrible">Horrible</button>
    <button class="white-washed">Faded</button>
    <button class="dark-on-red">Dark</button>
    <button class="pink-disaster">Pink</button>
    <button class="blue-wrong">Blue</button>
    <button class="lime-awful">Lime</button>
</body>
</html>
