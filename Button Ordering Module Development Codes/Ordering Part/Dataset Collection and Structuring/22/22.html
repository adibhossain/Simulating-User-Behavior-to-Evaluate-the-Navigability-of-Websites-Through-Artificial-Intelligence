<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Background Varied</title>
    <style>
        body {
            background-color: #0066cc;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        .btn {
            position: absolute;
            border: none;
            cursor: pointer;
        }
        .btn1 {
            top: 30px;
            left: 50px;
            padding: 35px 70px;
            background-color: #ffff00;
            color: #000000;
            font-size: 28px;
            border-radius: 0;
        }
        .btn2 {
            top: 90px;
            right: 90px;
            padding: 5px 10px;
            background-color: #ccddff;
            color: #003366;
            font-size: 8px;
            border-radius: 50px;
        }
        .btn3 {
            top: 200px;
            left: 80px;
            padding: 15px 30px;
            background-color: #ffffff;
            color: #0066cc;
            font-size: 15px;
            border-radius: 10px;
        }
        .btn4 {
            top: 280px;
            right: 160px;
            padding: 25px 50px;
            background-color: #003366;
            color: #99ccff;
            font-size: 20px;
            border-radius: 25px;
        }
        .btn5 {
            bottom: 140px;
            left: 110px;
            padding: 8px 16px;
            background-color: #0099ff;
            color: #001133;
            font-size: 10px;
            border-radius: 5px;
        }
        .btn6 {
            bottom: 80px;
            right: 60px;
            padding: 30px 60px;
            background-color: #ff6600;
            color: #ffffff;
            font-size: 24px;
            border-radius: 15px;
        }
        .btn7 {
            top: 52%;
            left: 52%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background-color: #004499;
            color: #aaccff;
            font-size: 16px;
            border-radius: 8px;
        }
        .btn8 {
            top: 140px;
            left: 300px;
            padding: 12px 24px;
            background-color: #6699ff;
            color: #000033;
            font-size: 12px;
            border-radius: 30px;
        }
        .btn9 {
            bottom: 200px;
            right: 250px;
            padding: 18px 36px;
            background-color: #001166;
            color: #ffffff;
            font-size: 14px;
            border-radius: 20px;
        }
        .btn10 {
            top: 360px;
            left: 220px;
            padding: 28px 56px;
            background-color: #3388ff;
            color: #ffffff;
            font-size: 22px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <button class="btn btn1">BRIGHT</button>
    <button class="btn btn2">low</button>
    <button class="btn btn3">Clean</button>
    <button class="btn btn4">Deep</button>
    <button class="btn btn5">mini</button>
    <button class="btn btn6">ORANGE</button>
    <button class="btn btn7">Center</button>
    <button class="btn btn8">Mid</button>
    <button class="btn btn9">Dark</button>
    <button class="btn btn10">LARGE</button>
</body>
</html>
