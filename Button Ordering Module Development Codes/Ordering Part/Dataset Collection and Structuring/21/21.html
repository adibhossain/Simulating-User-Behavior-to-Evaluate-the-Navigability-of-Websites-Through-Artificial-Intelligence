<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Background Medium</title>
    <style>
        body {
            background-color: #cc0000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        .btn {
            position: absolute;
            border: none;
            cursor: pointer;
        }
        .btn1 {
            top: 40px;
            left: 90px;
            padding: 32px 64px;
            background-color: #ffffff;
            color: #cc0000;
            font-size: 26px;
            border-radius: 50px;
        }
        .btn2 {
            top: 100px;
            right: 110px;
            padding: 12px 24px;
            background-color: #ffcccc;
            color: #990000;
            font-size: 14px;
            border-radius: 5px;
        }
        .btn3 {
            top: 220px;
            left: 70px;
            padding: 18px 36px;
            background-color: #ff6666;
            color: #330000;
            font-size: 16px;
            border-radius: 15px;
        }
        .btn4 {
            top: 320px;
            right: 180px;
            padding: 8px 16px;
            background-color: #990000;
            color: #ffcccc;
            font-size: 11px;
            border-radius: 25px;
        }
        .btn5 {
            bottom: 160px;
            left: 140px;
            padding: 22px 44px;
            background-color: #660000;
            color: #ff9999;
            font-size: 18px;
            border-radius: 8px;
        }
        .btn6 {
            bottom: 110px;
            right: 70px;
            padding: 14px 28px;
            background-color: #ff3333;
            color: #660000;
            font-size: 13px;
            border-radius: 20px;
        }
        .btn7 {
            top: 48%;
            left: 48%;
            padding: 26px 52px;
            background-color: #330000;
            color: #ffffff;
            font-size: 21px;
            border-radius: 30px;
        }
        .btn8 {
            top: 160px;
            left: 280px;
            padding: 6px 12px;
            background-color: #ffeeee;
            color: #cc0000;
            font-size: 9px;
            border-radius: 3px;
        }
        .btn9 {
            bottom: 220px;
            right: 220px;
            padding: 20px 40px;
            background-color: #ff0000;
            color: #ffffff;
            font-size: 17px;
            border-radius: 12px;
        }
        .btn10 {
            top: 380px;
            left: 200px;
            padding: 10px 20px;
            background-color: #aa0000;
            color: #ffdddd;
            font-size: 12px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <button class="btn btn1">MAIN</button>
    <button class="btn btn2">Light</button>
    <button class="btn btn3">Medium</button>
    <button class="btn btn4">small</button>
    <button class="btn btn5">Strong</button>
    <button class="btn btn6">Bright</button>
    <button class="btn btn7">DEEP</button>
    <button class="btn btn8">tiny</button>
    <button class="btn btn9">Bold</button>
    <button class="btn btn10">Soft</button>
</body>
</html>
