<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Size Chaos</title>
    <style>
        body {
            background-color: #ffff99;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .massive {
            position: absolute;
            top: 10%;
            left: 5%;
            background-color: #ffff66;
            color: #ffffaa;
            border: none;
            padding: 80px 160px;
            font-size: 48px;
            cursor: pointer;
        }
        .tiny1 {
            position: absolute;
            top: 15%;
            right: 20%;
            background-color: #ffff88;
            color: #ffffcc;
            border: none;
            padding: 1px 2px;
            font-size: 4px;
            cursor: pointer;
        }
        .tiny2 {
            position: absolute;
            bottom: 30%;
            left: 60%;
            background-color: #ffffdd;
            color: #ffff99;
            border: none;
            padding: 2px 4px;
            font-size: 5px;
            cursor: pointer;
        }
        .invisible {
            position: absolute;
            top: 50%;
            left: 50%;
            background-color: #ffff99;
            color: #ffff99;
            border: none;
            padding: 10px 20px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.1;
        }
        .huge {
            position: absolute;
            bottom: 5%;
            right: 10%;
            background-color: #ffff77;
            color: #ffffbb;
            border: none;
            padding: 60px 120px;
            font-size: 36px;
            cursor: pointer;
        }
        .microscopic {
            position: absolute;
            top: 80%;
            left: 30%;
            background-color: #ffffee;
            color: #ffff99;
            border: none;
            padding: 0.5px 1px;
            font-size: 3px;
            cursor: pointer;
        }
        .medium-bad {
            position: absolute;
            top: 40%;
            right: 40%;
            background-color: #ffff55;
            color: #ffff88;
            border: none;
            padding: 15px 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .almost-invisible {
            position: absolute;
            bottom: 60%;
            left: 20%;
            background-color: #ffffaa;
            color: #ffff99;
            border: 1px solid #ffffbb;
            padding: 8px 16px;
            font-size: 10px;
            cursor: pointer;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <button class="massive">GIANT</button>
    <button class="tiny1">.</button>
    <button class="tiny2">x</button>
    <button class="invisible">Hidden</button>
    <button class="huge">BIG</button>
    <button class="microscopic">i</button>
    <button class="medium-bad">Medium</button>
    <button class="almost-invisible">Faded</button>
</body>
</html>
