<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="main.js"></script>
<title>Book Shop</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f8f9fa;
    margin: 0;
    padding: 0;
  }
  .navbar {
    background-color: #343a40;
    color: #fff;
    padding: 10px;
    text-align: center;
  }
  .navbar a {
    color: #fff;
    text-decoration: none;
    margin: 0 10px;
  }
  .container {
    max-width: 800px;
    margin: 20px auto;
    padding: 20px;
    background-color: #fff;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }
  .search-container {
    text-align: center;
    margin-bottom: 20px;
  }
  .search-input {
    padding: 10px;
    width: 60%;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
  }
  .search-button {
    padding: 10px 20px;
    background-color: #007bff;
    border: none;
    border-radius: 5px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  .search-button:hover {
    background-color: #0056b3;
  }
  .footer {
    background-color: #343a40;
    color: #fff;
    text-align: center;
    padding: 20px;
    position: fixed;
    bottom: 0;
    width: 100%;
  }
</style>
</head>
<body style="background-color: cyan;">

<div class="navbar">
  <button style="background-color: yellow;" onclick="test_func(this)">Home</button>
  <button style="background-color: green;" onclick="test_func(this)">Books</button>
  <button style="background-color: red;" onclick="test_func(this)">About</button>
  <button style="background-color: brown;" onclick="test_func(this)">Contact</button>
</div>

<div class="container">
  <h2 style="text-align: center;">Welcome to our Book Shop</h2>
  <div class="search-container">
    <input type="text" class="search-input" placeholder="Search for books...">
    <button class="search-button" onclick="test_func(this)">Search</button>
  </div>
</div>

<div class="footer">
  <p>&copy; 2024 Book Shop. All rights reserved.</p>
</div>

</body>
</html>
