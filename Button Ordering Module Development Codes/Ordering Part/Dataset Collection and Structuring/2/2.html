<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Webpage</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://www.w3schools.com/w3images/mountains.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.7);
        }
        .jumbotron {
            background: rgba(0, 0, 0, 0.5);
            margin-top: 50px;
            color: #fff;
        }
        .btn-bad {
            background-color: #f00;
            color: #fff;
            border: 2px solid #000;
            font-size: 20px;
        }
        .btn-bad:hover {
            background-color: #000;
            color: #f00;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="#" onclick="test_func(this)">Tourist Webpage</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation" onclick="test_func(this)">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#" onclick="test_func(this)">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="test_func(this)">Destinations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="test_func(this)">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="jumbotron text-center">
        <h1>Explore the World</h1>
        <p>Discover new places with us</p>
        <button class="btn btn-primary btn-lg" onclick="test_func(this)">Learn More</button>
        <button class="btn btn-secondary btn-lg" onclick="test_func(this)">Get Started</button>
        <button class="btn btn-warning btn-lg" onclick="test_func(this)">Subscribe</button>
        <button class="btn btn-bad btn-lg" onclick="test_func(this)">Bad Button</button>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
                <div class="card">
                    <img class="card-img-top" src="https://www.w3schools.com/w3images/lights.jpg" alt="Lights">
                    <div class="card-body">
                        <h5 class="card-title">City Lights</h5>
                        <p class="card-text">Experience the vibrant nightlife of the city.</p>
                        <a href="#" class="btn btn-primary" onclick="test_func(this)">Explore</a>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
                <div class="card">
                    <img class="card-img-top" src="https://www.w3schools.com/w3images/nature.jpg" alt="Nature">
                    <div class="card-body">
                        <h5 class="card-title">Nature</h5>
                        <p class="card-text">Get close to nature and enjoy the serenity.</p>
                        <a href="#" class="btn btn-success" onclick="test_func(this)">Discover</a>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
                <div class="card">
                    <img class="card-img-top" src="https://www.w3schools.com/w3images/mountains.jpg" alt="Mountains">
                    <div class="card-body">
                        <h5 class="card-title">Mountains</h5>
                        <p class="card-text">Reach the top and enjoy breathtaking views.</p>
                        <a href="#" class="btn btn-danger" onclick="test_func(this)">Adventure</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
