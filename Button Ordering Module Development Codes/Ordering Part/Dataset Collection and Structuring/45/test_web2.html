<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
    <link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Land</title>

</head>
<body>

    <div class="navbar">
        <button onclick="test_func(this)" class="tertiary-button">Home</button>
        <button onclick="test_func(this)" class="secondary-button">About</button>
        <button onclick="test_func(this)" class="primary-button">Contact</button>
        <button onclick="test_func(this)" class="primary-button">Blog</button>
    </div>
    
    <div class="container">
        <h1>Welcome to Our Vegetable Page</h1>
        <div class="button-container">
            <button onclick="test_func(this)" class="button primary-button">Browse Vegetables</button>
            <button onclick="test_func(this)" class="button secondary-button">Add New Vegetable</button>
        </div>
    </div>

    <div class="left-container">
        <h2>Left Container</h2>
        <p>This container is on the left side.</p>
        <p>Hello, this left container.</p>
        <button onclick="test_func(this)" class="button tertiary-button">Click Here!</button>
    </div>

    <div class="right-container">
        <!-- Content for the right container -->
        <h2>Right Container</h2>
        <p>This container is aligned to the right.</p>
    </div>
    
    <div class="footer">
        <p>&copy; 2024 Vegetable Page. All rights reserved.</p>
        <div class="button-container">
            <button onclick="test_func(this)" class="button tertiary-button">Privacy Policy</button>
            <button onclick="test_func(this)" class="button secondary-button">Terms of Service</button>
        </div>
    </div>
    
    </body>
    </html>
