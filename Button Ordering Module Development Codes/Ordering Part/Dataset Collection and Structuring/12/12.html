<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Studio</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 40px;
            overflow: hidden;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .btn {
            border: 3px solid #000000;
            cursor: pointer;
            margin: 15px;
            background-color: #ffffff;
            color: #000000;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
        .btn-square-xs {
            width: 40px;
            height: 40px;
            font-size: 8px;
        }
        .btn-square-s {
            width: 60px;
            height: 60px;
            font-size: 10px;
        }
        .btn-square-m {
            width: 80px;
            height: 80px;
            font-size: 12px;
        }
        .btn-square-l {
            width: 120px;
            height: 120px;
            font-size: 16px;
        }
        .btn-rect-wide {
            width: 200px;
            height: 50px;
            font-size: 14px;
        }
        .btn-rect-tall {
            width: 60px;
            height: 100px;
            font-size: 10px;
        }
        .btn-circle-s {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 8px;
        }
        .btn-circle-m {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 10px;
        }
        .btn-circle-l {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            font-size: 12px;
        }
        .btn-diamond {
            width: 70px;
            height: 70px;
            transform: rotate(45deg);
            font-size: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ARCHITECTURE STUDIO</h1>
        <p>Minimal. Functional. Timeless.</p>
        
        <button class="btn btn-square-l">PROJECTS</button>
        <button class="btn btn-rect-wide">ABOUT US</button>
        <button class="btn btn-circle-l">TEAM</button>
        <button class="btn btn-square-m">SERVICES</button>
        <button class="btn btn-rect-tall">NEWS</button>
        <button class="btn btn-circle-m">AWARDS</button>
        <button class="btn btn-square-s">BLOG</button>
        <button class="btn btn-circle-s">FAQ</button>
        <button class="btn btn-diamond">+</button>
        <button class="btn btn-square-xs">GO</button>
    </div>
</body>
</html>
