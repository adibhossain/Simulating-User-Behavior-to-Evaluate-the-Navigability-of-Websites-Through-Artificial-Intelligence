<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js"></script>
	<link href="style.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Gaming</title>
    <style>
        body {
            background-color: #2a0845;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .btn {
            cursor: pointer;
            margin: 8px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .btn:hover {
            box-shadow: 0 0 20px currentColor;
        }
        .btn-pixel-xs {
            padding: 2px 4px;
            font-size: 8px;
            border: 1px solid;
        }
        .btn-pixel-s {
            padding: 4px 8px;
            font-size: 10px;
            border: 2px solid;
        }
        .btn-pixel-m {
            padding: 8px 16px;
            font-size: 12px;
            border: 2px solid;
        }
        .btn-pixel-l {
            padding: 12px 24px;
            font-size: 16px;
            border: 3px solid;
        }
        .btn-pixel-xl {
            padding: 20px 40px;
            font-size: 24px;
            border: 4px solid;
        }
        .btn-green {
            background-color: #00ff41;
            color: #2a0845;
            border-color: #00ff41;
        }
        .btn-cyan {
            background-color: #00ffff;
            color: #2a0845;
            border-color: #00ffff;
        }
        .btn-magenta {
            background-color: #ff00ff;
            color: #2a0845;
            border-color: #ff00ff;
        }
        .btn-yellow {
            background-color: #ffff00;
            color: #2a0845;
            border-color: #ffff00;
        }
        .btn-red {
            background-color: #ff0040;
            color: #ffffff;
            border-color: #ff0040;
        }
        .btn-blue {
            background-color: #0080ff;
            color: #ffffff;
            border-color: #0080ff;
        }
        .btn-orange {
            background-color: #ff8000;
            color: #2a0845;
            border-color: #ff8000;
        }
        .btn-purple {
            background-color: #8000ff;
            color: #ffffff;
            border-color: #8000ff;
        }
        .btn-white {
            background-color: #ffffff;
            color: #2a0845;
            border-color: #ffffff;
        }
        .btn-black {
            background-color: #000000;
            color: #00ff41;
            border-color: #00ff41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RETRO GAMING ARCADE</h1>
        <p>>>> PRESS START TO CONTINUE <<<</p>
        
        <button class="btn btn-green btn-pixel-xl">START GAME</button>
        <button class="btn btn-cyan btn-pixel-l">HIGH SCORES</button>
        <button class="btn btn-magenta btn-pixel-m">OPTIONS</button>
        <button class="btn btn-yellow btn-pixel-s">CREDITS</button>
        <button class="btn btn-red btn-pixel-xs">EXIT</button>
        <button class="btn btn-blue btn-pixel-m">ARCADE</button>
        <button class="btn btn-orange btn-pixel-l">SHOP</button>
        <button class="btn btn-purple btn-pixel-s">HELP</button>
        <button class="btn btn-white btn-pixel-m">SAVE</button>
        <button class="btn btn-black btn-pixel-l">LOAD</button>
    </div>
</body>
</html>
